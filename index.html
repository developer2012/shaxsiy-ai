<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharofiddin AI | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 800px; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #94a3b8; letter-spacing: 1px; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: var(--primary); }

        .input-group { display: flex; gap: 12px; }
        input[type="text"] {
            flex: 1; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px; border-radius: 12px; color: white;
            transition: 0.3s; font-size: 1rem;
        }
        input[type="text"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #0f172a; border: none; padding: 12px 25px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }

        #chat-box {
            height: 400px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            padding-right: 10px; margin: 20px 0;
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }

        .message { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: var(--primary); color: #0f172a; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .mic-btn {
            width: 50px; height: 50px; border-radius: 50%; padding: 0;
            justify-content: center; background: #ef4444; color: white;
        }
        .active-mic { background: var(--success) !important; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } }

        .key-badge {
            display: none; margin-top: 15px; padding: 12px;
            background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
            color: var(--success); border-radius: 12px; font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sharofiddin AI</h1>
        <p>ADVANCED API & VOICE INTELLIGENCE</p>
    </header>

    <div class="glass-card">
        <h2><i class="fas fa-key"></i> API Access Control</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Foydalanuvchi nomi...">
            <button onclick="generateKey()"><i class="fas fa-plus"></i> Kalit olish</button>
        </div>
        <div id="keyShow" class="key-badge"></div>
    </div>

    <div class="glass-card">
        <h2><i class="fas fa-robot"></i> Neural Network Chat</h2>
        <div id="chat-box">
            <div class="ai-msg message">Tizim tayyor. API kalit yarating va muloqotni boshlang.</div>
        </div>
        <div class="input-group">
            <button id="micBtn" class="mic-btn" onclick="toggleSTT()"><i class="fas fa-microphone"></i></button>
            <input type="text" id="msgInput" placeholder="Xabarni shu yerga yozing...">
            <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    let myApiKey = "";
    const BASE_URL = window.location.origin;

    // Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if(recognition) {
        recognition.lang = 'uz-UZ';
        recognition.onresult = (e) => {
            document.getElementById('msgInput').value = e.results[0][0].transcript;
            document.getElementById('micBtn').classList.remove('active-mic');
        };
        recognition.onend = () => document.getElementById('micBtn').classList.remove('active-mic');
    }

    function toggleSTT() {
        if(!recognition) return alert("Brauzer qo'llab-quvvatlamaydi");
        document.getElementById('micBtn').classList.add('active-mic');
        recognition.start();
    }

    async function generateKey() {
        const user = document.getElementById('username').value;
        if(!user) return;
        try {
            const res = await fetch(`${BASE_URL}/generate-key`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user})
            });
            const data = await res.json();
            myApiKey = data.api_key;
            const el = document.getElementById('keyShow');
            el.innerHTML = `<i class="fas fa-check-circle"></i> Kalit faollashtirildi: <b>${myApiKey}</b>`;
            el.style.display = "block";
        } catch(e) { alert("Xatolik yuz berdi"); }
    }

    async function askAI() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text || !myApiKey) return;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="user-msg message">${text}</div>`;
        input.value = "";
        
        const aiDiv = document.createElement('div');
        aiDiv.className = 'ai-msg message';
        aiDiv.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;
        chatBox.appendChild(aiDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`${BASE_URL}/v1/chat`, {
                method: 'POST',
                headers: { 'X-Sharof-API-Key': myApiKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            aiDiv.innerText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                lines.forEach(line => {
                    if (line.startsWith("data: ")) {
                        const data = JSON.parse(line.substring(6));
                        if(data.reply) aiDiv.innerText += data.reply;
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (e) { aiDiv.innerText = "Xatolik: Aloqa uzildi."; }
    }
</script>
</body>
</html>
